name: Generate Feeds

on:
  schedule:
    # All feeds (tweets, podcasts, blogs): once daily at 6:17am UTC
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tweets-only
          - podcasts-only
          - blogs-only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate feeds
        env:
          # 我们塞入虚假的、不为空的临时占位符，直接骗过脚本的初始化非空校验
          X_BEARER_TOKEN: "dummy_token_for_bypass"
          POD2TXT_API_KEY: "dummy_key_for_bypass"
          PODZTXT_API_KEY: "dummy_key_for_bypass"
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" != "all" ]; then
            cd scripts && node generate-feed.js --${{ inputs.mode }}
          else
            cd scripts && node generate-feed.js
          fi

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 允许在找不到文件时顺畅结束，防止脚本在初次运行时因没有生成特定 json 而报错
          git add feed-x.json feed-podcasts.json feed-blogs.json state-feed.json || true
          git diff --cached --quiet || git commit -m "chore: update feeds [skip ci]"
          git push
